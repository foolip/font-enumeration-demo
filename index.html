<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Enumerator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Font Enumerator</h1>
      <p>Detected <span id="count" class="stats">0</span> system fonts.</p>
    </header>

    <div class="controls">
      <input
        type="text"
        id="previewInput"
        value="The quick brown fox jumps over the lazy dog."
        spellcheck="false">
      <div class="options">
        <label><input type="checkbox" id="checkMetrics">Compare Metrics</label>
        <label><input type="checkbox" id="checkPixels" checked>Compare Pixels</label>
      </div>
    </div>

    <div id="fontGrid" class="grid"></div>

    <script>
      const FONT_LIST = [
        ...new Set([
          // macOS / iOS
          "San Francisco",
          "Apple System",
          "Helvetica Neue",
          "Helvetica",
          "Lucida Grande",
          "Menlo",
          "Monaco",
          "Geneva",
          "Baskerville",
          "Optima",
          "American Typewriter",
          "Avenir",
          "Avenir Next",
          "Charter",
          "Didot",
          "Futura",
          "Iowan Old Style",
          "Palatino",
          "Seravek",
          "Superclarendon",
          "Times",
          "Verdana",
          "Zapfino",

          // Windows
          "Segoe UI",
          "Calibri",
          "Cambria",
          "Consolas",
          "Constantia",
          "Corbel",
          "Franklin Gothic Medium",
          "Tahoma",
          "Trebuchet MS",
          "Lucida Sans Unicode",
          "Microsoft Sans Serif",
          "MS Serif",
          "MS Sans Serif",
          "Segoe Print",
          "Segoe Script",
          "Georgia",
          "Impact",
          "Lucida Console",
          "Palatino Linotype",
          "Sylfaen",

          // Linux / Android
          "Roboto",
          "Open Sans",
          "Ubuntu",
          "DejaVu Sans",
          "Liberation Sans",
          "Noto Sans",
          "Droid Sans",
          "Droid Serif",
          "Droid Sans Mono",
          "Cantarell",

          // Web Safe / Standard
          "Arial",
          "Arial Black",
          "Comic Sans MS",
          "Courier",
          "Courier New",
          "Georgia",
          "Impact",
          "Times New Roman",
          "Verdana",
          "Webdings",
          "Wingdings",
          "Symbol",
          "Zapf Dingbats",

          // Specialized
          "Copperplate",
          "Papyrus",
          "Herculanum",
          "Chalkboard",
          "Bradley Hand",
          "Brush Script MT",
          "Snell Roundhand",
          "Marker Felt",

          // Monospaced / Coding
          "Lucida Console",
          "Inconsolata",
          "Source Code Pro",
          "Fira Code",

          // System Keywords
          "-apple-system",
          "BlinkMacSystemFont",
          ".AppleSystemUIFont",
          "system-ui",
          "ui-serif",
          "ui-sans-serif",
          "ui-monospace",
          "ui-rounded",
        ]),
      ].sort();

      const FALLBACKS = ["serif", "sans-serif", "monospace"];
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      let fallbackCache = new Map();
      let debounceTimer;

      function getSignature(font, text, includePixels = false) {
        ctx.font = `40px ${font}`;
        const m = ctx.measureText(text);
        const PADDING = 10;
        const asc = Math.ceil(m.actualBoundingBoxAscent || 30);
        const dsc = Math.ceil(m.actualBoundingBoxDescent || 10);
        const w = Math.ceil(m.width);

        const sig = {
          w: w + PADDING * 2,
          h: asc + dsc + PADDING * 2,
          asc,
          data: null,
        };

        if (includePixels) {
          if (canvas.width < sig.w) canvas.width = sig.w;
          if (canvas.height < sig.h) canvas.height = sig.h;

          ctx.clearRect(0, 0, sig.w, sig.h);
          ctx.font = `40px ${font}`;
          ctx.textBaseline = "alphabetic";
          ctx.fillText(text, PADDING, PADDING + asc);
          sig.data = new Uint32Array(
            ctx.getImageData(0, 0, sig.w, sig.h).data.buffer,
          );
        }
        return sig;
      }

      function isInstalled(name, text, options) {
        for (const fallback of FALLBACKS) {
          const base = fallbackCache.get(fallback);
          const cand = getSignature(
            `"${name}", ${fallback}`,
            text,
            options.pixels,
          );

          if (options.metrics && (cand.w !== base.w || cand.h !== base.h))
            return true;
          if (options.pixels) {
            const d1 = cand.data,
              d2 = base.data;
            if (d1.length !== d2.length) return true;
            for (let i = 0; i < d1.length; i++)
              if (d1[i] !== d2[i]) return true;
          }
        }
        return false;
      }

      function scan() {
        const text = document.getElementById("previewInput").value;
        const options = {
          metrics: document.getElementById("checkMetrics").checked,
          pixels: document.getElementById("checkPixels").checked,
        };

        const grid = document.getElementById("fontGrid");
        grid.replaceChildren();
        if (!text || (!options.metrics && !options.pixels)) {
          document.getElementById("count").textContent = "0";
          return;
        }

        fallbackCache.clear();
        for (const f of FALLBACKS) {
          fallbackCache.set(f, getSignature(f, text, options.pixels));
        }

        let count = 0;

        for (const fontName of FONT_LIST) {
          if (isInstalled(fontName, text, options)) {
            count++;
            const card = document.createElement("div");
            card.className = "card";

            const header = document.createElement("div");
            header.className = "card-header";
            header.textContent = fontName;

            const preview = document.createElement("div");
            preview.className = "preview";
            preview.style.fontFamily = `'${fontName}', sans-serif`;
            preview.textContent = text;

            card.append(header, preview);
            grid.appendChild(card);
          }
        }

        document.getElementById("count").textContent = count;
      }

      document.getElementById("previewInput").addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(scan, 250);
      });
      document.getElementById("checkMetrics").addEventListener("change", scan);
      document.getElementById("checkPixels").addEventListener("change", scan);

      scan();
    </script>
  </body>
</html>
